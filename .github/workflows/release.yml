name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release packages
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "Building ${VERSION}"

          mkdir -p /tmp/universal /tmp/admin

          rsync -a --exclude='.git' --exclude='.github' --exclude='.env' --exclude='admin' . /tmp/universal/
          rsync -a --exclude='.git' --exclude='.github' --exclude='.env' . /tmp/admin/

          cd /tmp/universal
          tar -czf "${GITHUB_WORKSPACE}/shellport-${VERSION}.tar.gz" .
          zip -r "${GITHUB_WORKSPACE}/shellport-${VERSION}.zip" .

          cd /tmp/admin
          tar -czf "${GITHUB_WORKSPACE}/shellport-${VERSION}-admin.tar.gz" .

          cd "${GITHUB_WORKSPACE}"
          ls -la shellport-*.tar.gz shellport-*.zip install.sh Install.ps1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            shellport-*.tar.gz
            shellport-*.zip
            install.sh
            Install.ps1
