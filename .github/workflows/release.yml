name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release packages
        run: |
          VERSION="${GITHUB_REF_NAME}"

          # Universal package (what everyone downloads)
          tar -czf "shellport-${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='admin' \
            --exclude='.env' \
            .

          zip -r "shellport-${VERSION}.zip" . \
            -x '.git/*' \
            -x '.github/*' \
            -x 'admin/*' \
            -x '.env'

          # Admin package (includes MDM reset scripts)
          tar -czf "shellport-${VERSION}-admin.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            shellport-*.tar.gz
            shellport-*.zip
            install.sh
            Install.ps1
