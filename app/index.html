<!DOCTYPE html>
<html lang="en" data-t="dark" data-f="sans">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ShellPort</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&family=Space+Grotesk:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" rel="stylesheet">
<style>
:root{--mono:'Geist Mono',monospace}
html[data-f="sans"]{--disp:'Geist',sans-serif;--body:'Geist',sans-serif}
html[data-f="grotesk"]{--disp:'Space Grotesk',sans-serif;--body:'Geist',sans-serif}
html[data-f="editorial"]{--disp:'Fraunces',Georgia,serif;--body:'Geist',sans-serif}
html[data-f="editorial"] h1 .it,html[data-f="editorial"] .qh{font-style:italic}
html[data-t="dark"]{--bg:#001413;--hair:rgba(197,205,205,.12);--hair2:rgba(197,205,205,.22);--tx:#AEB9B8;--txhi:#F4F5F5;--dim:#5E706F}
html[data-t="light"]{--bg:#F5F6F4;--hair:rgba(0,21,20,.11);--hair2:rgba(0,21,20,.2);--tx:#37514F;--txhi:#001413;--dim:#7A8C8A}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
.nav{display:flex;align-items:center;gap:12px;padding:14px 30px;border-bottom:1px solid var(--hair)}
.logo{display:flex;align-items:center;gap:9px;cursor:default}.logo .wm{font-family:var(--body);font-weight:500;font-size:15px;letter-spacing:-.01em;color:var(--txhi)}
.ctx{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.vbadge{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);border:1px solid var(--hair2);border-radius:4px;padding:2px 7px}
.rsp{margin-left:auto;display:flex;align-items:center;gap:12px}
.tabs{display:flex;gap:16px}
.tab{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);cursor:pointer;padding-bottom:2px;border-bottom:1px solid transparent;background:none;border-top:none;border-left:none;border-right:none}
.tab.on{color:var(--txhi);border-bottom-color:var(--acc)}
.rec{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim)}
.rd{width:6px;height:6px;border-radius:50%;background:var(--alert);position:relative}
.nbtn{width:28px;height:28px;border:1px solid var(--hair);border-radius:5px;background:transparent;color:var(--tx);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}.nbtn:hover{border-color:var(--hair2)}.nbtn.on{border-color:var(--acc);color:var(--acc)}
.body{padding:40px 40px 64px}.body-in{max-width:680px;margin:0 auto}
.lbl{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:10px;margin-bottom:18px}
.lbl .ln{flex:1;height:1px;background:var(--hair)}.lbl .ct{color:var(--acc)}.lbl .ca{color:var(--alert)}
h1{font-family:var(--disp);font-weight:400;font-size:42px;line-height:1.08;letter-spacing:-.02em;color:var(--txhi);max-width:600px}
h1 .it{color:var(--acc)}
.lede{font-size:14px;line-height:1.7;color:var(--tx);max-width:460px;margin:20px 0 0}.lede .hl{color:var(--txhi)}
.big{font-family:var(--body);font-weight:300;font-size:74px;line-height:.9;letter-spacing:-.03em;color:var(--txhi)}.big .pc{font-size:24px;color:var(--dim)}
.track{height:1px;background:var(--hair2);margin:20px 0 9px;max-width:520px;position:relative}.track .f{position:absolute;left:0;top:0;height:1px;background:var(--acc);transition:width .5s ease}
.meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--dim);max-width:520px}
.now{font-size:13px;color:var(--tx);margin-top:18px;display:flex;align-items:center;gap:10px}
.spin{width:12px;height:12px;border:1.5px solid var(--hair2);border-top-color:var(--acc);border-radius:50%;display:inline-block}
.vlog{font-family:var(--mono);font-size:11px;color:var(--acc);cursor:pointer;margin-top:18px;display:inline-block}.vlog:hover{color:var(--txhi)}
.sec{margin-top:26px}
.r{display:flex;align-items:baseline;gap:16px;padding:13px 0;border-bottom:1px solid var(--hair)}.r:last-child{border:none}
.rn{font-family:var(--mono);font-size:11px;color:var(--dim);width:16px;flex-shrink:0}
.rb{flex:1;font-size:14px;line-height:1.5}.rb .hl{color:var(--txhi)}.rb .al{color:var(--alert)}.rb .sub{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:4px;line-height:1.5}
.rs{font-family:var(--mono);font-size:11px;flex-shrink:0;white-space:nowrap;display:flex;align-items:center;gap:6px}.rs.cl{color:var(--dim)}.rs.cl i{color:var(--acc)}.rs.sc{color:var(--acc)}.rs.pe{color:var(--dim)}.rs.al{color:var(--alert)}
.act{font-family:var(--mono);font-size:11px;color:var(--acc);cursor:pointer;white-space:nowrap;flex-shrink:0}.act:hover{color:var(--txhi)}
.qh{font-family:var(--disp);font-size:28px;color:var(--txhi);margin:6px 0 14px;font-weight:400}
.qb{max-width:600px}.qb p{font-size:14px;line-height:1.75;margin:0 0 12px}.qb code{font-family:var(--mono);font-size:12px;color:var(--acc)}
.qc{font-family:var(--mono);font-size:12px;color:var(--acc);border-left:1px solid var(--hair2);padding:6px 0 6px 16px;margin:10px 0;word-break:break-all}
.qc.al{color:var(--alert);border-color:var(--alert)}
.facts{display:flex;gap:36px;flex-wrap:wrap;padding:16px 0;border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);margin-bottom:6px}
.fl{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}.fv{font-family:var(--mono);font-size:14px;color:var(--txhi)}
.actions{display:flex;gap:22px;margin-top:26px;padding-top:18px;border-top:1px solid var(--hair);flex-wrap:wrap}
.alink{font-family:var(--mono);font-size:12px;color:var(--acc);cursor:pointer;display:inline-flex;align-items:center;gap:7px;background:none;border:none}.alink:hover{color:var(--txhi)}.alink.d{color:var(--alert)}.alink.n{color:var(--dim)}.alink.n:hover{color:var(--txhi)}
.center{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}.center h1{font-size:38px}
.check{font-family:var(--disp);font-size:56px;line-height:1;color:var(--acc);margin-bottom:8px}
.ntc{font-family:var(--mono);font-size:11px;margin-top:22px;color:var(--alert)}.ntc.g{color:var(--acc)}
.gate{max-width:300px;margin:auto;width:100%;text-align:center}
.glogo{display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:28px}.glogo .wm{font-family:var(--body);font-weight:500;font-size:22px;letter-spacing:-.01em;color:var(--txhi)}
.fld{text-align:left;margin:0 0 12px}.fld label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.fld input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--hair2);padding:9px 2px;color:var(--txhi);font-family:var(--mono);font-size:14px;outline:none}.fld input:focus{border-color:var(--acc)}
.gerr{font-family:var(--mono);font-size:11px;color:var(--alert);margin-top:10px;min-height:14px}
.seg{display:inline-flex;gap:14px}.seg span{font-family:var(--mono);font-size:11px;color:var(--dim);cursor:pointer;padding-bottom:2px;border-bottom:1px solid transparent}.seg span.on{color:var(--txhi);border-bottom-color:var(--acc)}
.sw{width:34px;height:19px;border-radius:10px;background:var(--hair);border:1px solid var(--hair2);position:relative;cursor:pointer;flex-shrink:0;transition:.2s}.sw.on{background:var(--acc);border-color:var(--acc)}.sw::after{content:"";width:13px;height:13px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:.2s}.sw.on::after{transform:translateX(15px)}
.sw1{width:18px;height:18px;border-radius:5px;cursor:pointer;border:1px solid var(--hair2)}.sw1.on{box-shadow:0 0 0 2px var(--bg),0 0 0 3px currentColor}
.opt{font-family:var(--mono);font-size:11px;color:var(--tx);border:1px solid var(--hair);padding:4px 9px;border-radius:5px;cursor:pointer;background:none}.opt:hover{border-color:var(--hair2)}.opt.on{border-color:var(--acc);color:var(--acc)}
.ninp{width:72px;background:transparent;border:none;border-bottom:1px solid var(--hair2);padding:5px 2px;color:var(--txhi);font-family:var(--mono);font-size:13px;outline:none;text-align:right}.ninp:focus{border-color:var(--acc)}
.tinp{width:100%;background:transparent;border:none;border-bottom:1px solid var(--hair2);padding:6px 2px;color:var(--txhi);font-family:var(--mono);font-size:12px;outline:none}.tinp:focus{border-color:var(--acc)}
.runbtn{font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--acc);cursor:pointer;background:none;border:1px solid var(--hair2);border-radius:5px;padding:4px 9px;margin:8px 0 0 32px;display:inline-flex;align-items:center;gap:6px}.runbtn:hover{border-color:var(--acc)}.runbtn.d{color:var(--alert)}.runbtn.d:hover{border-color:var(--alert)}
.swrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.strm{font-family:var(--mono);font-size:12px;line-height:1.75;margin-top:14px;max-height:60vh;overflow-y:auto}
.sl{display:flex;gap:12px}.stm{color:var(--dim);flex-shrink:0}.v-info{color:var(--tx)}.v-ok{color:var(--acc)}.v-warn{color:var(--alert)}.v-err{color:var(--alert)}.v-step{color:var(--txhi)}
.qhtml{max-width:600px;font-size:14px;line-height:1.75;color:var(--tx)}
.qhtml h1,.qhtml h2,.qhtml h3,.qhtml h4{font-family:var(--mono);color:var(--acc);margin:18px 0 8px;line-height:1.4;font-weight:500}
.qhtml h1{font-size:17px}.qhtml h2{font-size:15px}.qhtml h3{font-size:14px}
.qhtml p{margin:8px 0}.qhtml ul,.qhtml ol{margin:8px 0 8px 22px}.qhtml li{margin:4px 0}
.qhtml code{font-family:var(--mono);font-size:12px;color:var(--acc)}
.qhtml pre{background:var(--hair);border-left:1px solid var(--hair2);padding:12px 14px;margin:12px 0;overflow-x:auto;border-radius:0}
.qhtml a{color:var(--acc)}.qhtml table{border-collapse:collapse;margin:12px 0}.qhtml td,.qhtml th{border:1px solid var(--hair2);padding:7px 10px;font-size:13px}
@media (prefers-reduced-motion:no-preference){.spin{animation:esp .7s linear infinite}@keyframes esp{to{transform:rotate(360deg)}}.rd::after{content:"";position:absolute;inset:-3px;border-radius:50%;border:1px solid var(--alert);animation:erp 2s ease-out infinite;opacity:.5}@keyframes erp{to{opacity:0;transform:scale(2.2)}}}
</style>
</head>
<body>
<div class="nav"><div class="logo" id="logo"></div><span class="ctx" id="ctx"></span><span class="vbadge" id="vbadge"></span><div class="rsp" id="rsp"></div></div>
<div class="body"><div class="body-in" id="body"></div></div>
<script>
const $=id=>document.getElementById(id);
const root=document.documentElement;
const mq=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)');
const PAL={cerulean:{d:'#4FA3E8',l:'#1F61AE'},foam:{d:'#74B2BA',l:'#2E6E80'},kelp:{d:'#84BD7F',l:'#3B7A43'},tentacle:{d:'#E0B45F',l:'#8A5A14'},violet:{d:'#C49ABF',l:'#8A5E83'},mono:{d:'#C5CDCD',l:'#3A4F4D'}};
const ALERT={d:'#CF8060',l:'#A54A34'};
const MARK='<svg width="28" height="24" viewBox="0 0 28 24"><path d="M6 4H3.5v16H6" fill="none" stroke="var(--acc)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 4h2.5v16H22" fill="none" stroke="var(--acc)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 8l4 4-4 4" fill="none" stroke="var(--acc)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';

let S={status:"initializing",mode:"candidate",adminAvailable:false,adminMode:false,appearance:{theme:"system",accent:"cerulean",font:"sans"},
  steps:[],config:{},ides:[],enabledEditors:[],terminalEnabled:true,question:null,questionHtml:null,questionError:null,questionLoading:false,
  questionVisible:true,questionPdf:null,timer:null,eventComplete:null,validationLocked:false,containmentLeak:null,error:null,
  fixes:{trouble:[],manual:[],emergency:null}};
const ui={view:'auto',tab:'settings',unlocked:false,localComplete:false,help:null,logView:false};
let adminToken=null, sessionTheme=null, adminCfg=null, pendingAfterUnlock=null;
let prog={pct:0,op:'',phase:'setup'};

// ── Appearance ───────────────────────────────────────────────────────────────
function resolveTheme(){
  if(sessionTheme) return sessionTheme;
  const t=(S.appearance&&S.appearance.theme)||'system';
  if(t==='system') return (mq&&mq.matches)?'dark':'light';
  return t;
}
function applyTokens(){
  const theme=resolveTheme(), font=(S.appearance&&S.appearance.font)||'sans', accent=(S.appearance&&S.appearance.accent)||'cerulean';
  root.dataset.t=theme; root.dataset.f=font;
  const tk=theme==='dark'?'d':'l';
  root.style.setProperty('--acc',(PAL[accent]||PAL.cerulean)[tk]);
  root.style.setProperty('--alert',ALERT[tk]);
}
applyTokens();

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function pad(n){return String(n).padStart(2,'0')}
function mmss(s){if(s==null||s<0)s=0;const m=Math.floor(s/60),x=Math.floor(s%60);return pad(m)+':'+pad(x)}
function trk(p){return '<div class="track"><div class="f" style="width:'+Math.max(0,Math.min(100,p))+'%"></div></div>'}
function rw(n,b,s,sc,a,go){const st=s?'<span class="rs '+sc+'">'+(sc==='cl'?'<i class="ti ti-check"></i>':'')+s+'</span>':'';const ac=a?'<span class="act" '+(go?'data-go="'+go+'"':'')+'>'+a+'</span>':'';return '<div class="r">'+(n?'<span class="rn">'+n+'</span>':'')+'<div class="rb">'+b+'</div>'+st+ac+'</div>'}
function stepRow(n,t,cause,c,al){return '<div class="r" style="display:block"><div style="display:flex;gap:16px;align-items:baseline"><span class="rn">'+n+'</span><span class="rb"><span class="hl">'+t+'</span>'+(cause?'<div class="sub">'+cause+'</div>':'')+'</span></div><div class="qc'+(al?' al':'')+'" style="margin:8px 0 0 32px">'+c+'</div></div>'}
function tg(n,d,on,key){return '<div class="r" style="align-items:center"><div class="rb"><span class="hl">'+n+'</span>'+(d?'<div class="sub">'+d+'</div>':'')+'</div><div class="sw '+(on?'on':'')+'" data-tg="'+key+'"></div></div>'}
const STATUS_CLASS={done:'cl',running:'sc',pending:'pe',warning:'al',error:'al',skipped:'pe'};
const STATUS_WORD={done:'done',running:'…',pending:'pending',warning:'check',error:'failed',skipped:'skipped'};

// ── Screens ──────────────────────────────────────────────────────────────────
function machineId(){return (S.config&&S.config.MACHINE_LABEL)||'Workstation'}
function elapsedSecs(){return S.timer?Math.max(0,S.timer.active):null}
function remainingSecs(){return S.timer?Math.max(0,(S.timer.limitSecs||0)-S.timer.active):null}

function progressBlock(label,right){
  return '<div class="big">'+prog.pct+'<span class="pc">%</span></div>'+trk(prog.pct)
    +'<div class="meta"><span>'+esc(prog.op||label||'Working')+'</span><span>'+esc(right||'')+'</span></div>'
    +'<div class="now"><span class="spin"></span>'+esc(prog.op||'Preparing')+'</div>';
}
function stepsBlock(){
  if(!S.steps||!S.steps.length) return '';
  let h='<div class="sec">';
  S.steps.forEach(st=>{h+=rw('','<span class="hl">'+esc(st.label)+'</span>',STATUS_WORD[st.status]||st.status,STATUS_CLASS[st.status]||'pe')});
  return h+'</div>';
}
function qMode(){return (S.config&&S.config.QUESTION_DELIVERY)||'auto'}
function showQuestionPdf(){const m=qMode();return !!S.questionPdf&&(m==='pdf'||(m==='auto'&&!S.questionHtml))}
function questionBody(){
  const mode=qMode();
  if(mode==='none') return '<p class="lede" style="margin-top:0">Your interviewer will provide the question for this session.</p>';
  if(S.questionLoading) return '<p class="lede" style="margin-top:0">Loading the interview question…</p>';
  if(S.questionError && !S.question && !S.questionHtml && !S.questionPdf) return '<p class="lede" style="margin-top:0;color:var(--alert)">'+esc(S.questionError)+'</p>';
  let h='';
  if(S.question) h+='<div class="qh">'+esc(S.question)+'</div>';
  if(mode!=='pdf' && S.questionHtml) h+='<div class="qhtml">'+S.questionHtml+'</div>';
  else if(!S.question && !S.questionPdf) h+='<p class="lede" style="margin-top:0">Your interviewer will share the question.</p>';
  else if(mode==='pdf' || (mode==='auto'&&!S.questionHtml)) h+='<p class="lede" style="margin-top:0">Your full question is in the PDF below.</p>';
  return h;
}
function editorActions(){
  const c=S.config||{};
  let h='';
  (S.enabledEditors||[]).forEach(n=>{h+='<button class="alink" data-ide="'+esc(n)+'">Start in '+esc(n)+' →</button>'});
  if((c.SHOW_VSCODE_DEV||'true')!=='false') h+='<button class="alink" data-ide="vscode.dev">Start in vscode.dev →</button>';
  if((c.SHOW_GITHUB_DEV||'true')!=='false') h+='<button class="alink" data-ide="github.dev">Start in github.dev →</button>';
  if(S.terminalEnabled) h+='<button class="alink" data-term="1">Start in terminal →</button>';
  return h;
}

function scrInstall(){
  return '<div class="lbl"><span>Interview prep — your computer</span><span class="ln"></span><span class="ct">runs isolated</span></div>'
    +progressBlock('Building isolated environment','')
    +'<p class="lede">ShellPort runs in a container and <span class="hl">removes itself completely</span> when you finish. Nothing on your machine is changed.</p>'
    +'<span class="vlog" data-go="log">View build log →</span>';
}
function scrBuild(){
  return '<div class="lbl"><span>Interview prep — building environment</span><span class="ln"></span><span class="ct">'+esc(machineId())+'</span></div>'
    +progressBlock('Building container image','')
    +'<span class="vlog" data-go="log">View build log →</span>'+stepsBlock();
}
function scrQuestion(){
  const candidate=curView()==='candidate';
  const t=candidate?(elapsedSecs()!=null?'elapsed '+mmss(elapsedSecs()):'in progress'):(remainingSecs()!=null?'remaining '+mmss(remainingSecs()):'in progress');
  const ctxLbl=candidate?'Your question':'Question';
  return '<div class="lbl"><span>'+ctxLbl+'</span><span class="ln"></span><span>'+esc(t)+'</span></div>'
    +questionBody()
    +(showQuestionPdf()?'<div style="margin-top:14px"><a class="alink" href="'+esc(S.questionPdf)+'" target="_blank">Download question PDF →</a></div>':'')
    +'<div class="actions">'+editorActions()+'<button class="alink d" data-go="end">End interview →</button></div>';
}
function scrComplete(){
  const candidate=curView()==='candidate';
  const time=elapsedSecs()!=null?mmss(elapsedSecs()):'—';
  return '<div class="center"><div class="lbl" style="justify-content:center"><span>Interview complete</span></div>'
    +'<h1>Thank you for interviewing with <span class="it">DigitalOcean</span>.</h1>'
    +'<p class="lede" style="text-align:center;margin:18px auto 0">'+(candidate?'Show your interviewer your completion time during the meeting.':'Please return this workstation to your interviewer.')+'</p>'
    +'<div class="facts" style="justify-content:center;margin-top:22px"><div><div class="fl">'+(candidate?'Completion time':'Time used')+'</div><div class="fv">'+time+'</div></div></div>'
    +(candidate
      ?'<div class="actions" style="justify-content:center;border-top:none"><button class="alink d" data-go="remove">Reset &amp; remove ShellPort →</button></div>'
      :'<div class="ntc">This machine is ready to be reset.</div>')
    +'</div>';
}
function scrRemove(){
  return '<div class="lbl"><span>Removing ShellPort — restoring your computer</span><span class="ln"></span><span class="ct">'+prog.pct+'%</span></div>'
    +progressBlock('Removing container and volumes','')
    +'<p class="lede">Returning your machine to its original state. Nothing is left behind.</p>'
    +'<span class="vlog" data-go="log">View removal log →</span>';
}
function scrRemoved(){
  return '<div class="center"><div class="check">✓</div><h1>ShellPort <span class="it">removed</span>.</h1>'
    +'<p class="lede" style="text-align:center;margin:18px auto 0">Your computer has been returned to its original state. Nothing was left behind.</p>'
    +'<div class="ntc g">Verified clean — you can close this window</div></div>';
}
function scrNeedsReset(){
  return '<div class="lbl"><span class="ca">Validation hold</span><span class="ln"></span></div>'
    +'<h1>This machine needs a <span class="it" style="color:var(--alert)">reset</span>.</h1>'
    +'<p class="lede">Residue from a previous session was detected and could not be cleared automatically. An administrator must reset this workstation before the next interview.</p>'
    +stepsBlock();
}
function scrFailed(){

// Help — steps come from the server (S.fixes), resolved per-platform, so the
// command shown is exactly what "Run in terminal" executes.

  const n=String(num).padStart(2,'0'), runnable=f.run!==false;
  let h='<div class="r" style="display:block"><div style="display:flex;gap:16px;align-items:baseline"><span class="rn">'+n+'</span>'
    +'<span class="rb"><span class="hl">'+esc(f.label)+'</span>'+(f.cause?'<div class="sub">'+esc(f.cause)+'</div>':'')+'</span></div>';
  if(runnable){
    h+='<div class="qc" style="margin:8px 0 0 32px">'+esc(f.cmd)+'</div>'
      +'<button class="runbtn'+(f.id==='m-remove'?' d':'')+'" data-run="'+esc(f.id)+'"><i class="ti ti-player-play"></i>Run in terminal</button>';
  } else {
    h+='<div class="sub" style="margin:8px 0 0 32px">'+esc(f.cmd)+'</div>';
  }
  return h+'</div>';
}

// ── View resolution + render ─────────────────────────────────────────────────
function curView(){return (S.adminAvailable && ui.view==='admin')?'admin':(S.mode||'candidate')}
function screen(){
  const view=curView(), st=S.status;
  if(ui.help==='troubleshoot') return scrTrouble();
  if(ui.help==='manual') return scrManual();
  if(view==='admin'){
    if(!ui.unlocked) return scrGate();
    if(ui.tab==='log') return scrLog(false);
    if(ui.tab==='reset') return scrReset();
    return scrSettings();
  }
  if(ui.logView) return scrLog(true);
  if(st==='event_complete') return scrEventComplete();
  if(st==='error') return scrFailed();
  if(st==='needs_reset') return scrNeedsReset();
  if(st==='cleanup'||st==='ending') return scrRemove();
  if(st==='done') return scrRemoved();
  if(st==='ready') return ui.localComplete?scrComplete():scrQuestion();
  return view==='managed'?scrBuild():scrInstall();
}
function ctxLabel(){
  const view=curView();
  if(view==='admin') return ui.tab==='reset'?('Reset · '+machineId()):(ui.tab==='log'?('Build log · '+machineId()):'Settings');
  return view==='managed'?machineId():'Your computer';
}
function vbadgeLabel(){const v=curView();return v.charAt(0).toUpperCase()+v.slice(1)}

function renderNav(){
  $('logo').innerHTML=MARK+'<span class="wm">ShellPort</span>';
  $('ctx').textContent=ctxLabel();
  $('vbadge').textContent=vbadgeLabel();
  const view=curView();
  let r='';
  // Troubleshooting: a candidate can fix their own (BYOD) machine, so it's always
  // available there. On a managed DO station it's gated behind admin unlock so a
  // candidate session can't reach teardown/remove commands.
  const showHelp = !S.adminMode || (view==='admin' && ui.unlocked);
  if(showHelp) r+='<button class="nbtn'+(ui.help?' on':'')+'" data-act="help" title="Troubleshooting"><i class="ti ti-lifebuoy"></i></button>';
  if(view==='admin'){
    if(ui.unlocked){
      r+='<div class="tabs">'
        +'<button class="tab '+(ui.tab==='settings'?'on':'')+'" data-tab="settings">Settings</button>'
        +'<button class="tab '+(ui.tab==='reset'?'on':'')+'" data-tab="reset">Reset</button>'
        +'<button class="tab '+(ui.tab==='log'?'on':'')+'" data-tab="log">Build log</button></div>';
      r+='<div class="rec"><span class="rd"></span>Recording</div>';
    }
    r+='<button class="nbtn" data-act="exit" title="Exit admin"><i class="ti ti-x"></i></button>';
  } else {
    if(S.adminAvailable) r+='<button class="nbtn" data-act="lock" title="Admin"><i class="ti ti-lock"></i></button>';
  }
  r+='<button class="nbtn" data-act="theme" title="Theme"><i class="ti ti-'+(resolveTheme()==='dark'?'sun':'moon')+'"></i></button>';

function render(){
  applyTokens();
  renderNav();
  const b=$('body');
  b.innerHTML=screen();
  wireBody();
  if(b.querySelector('#strm')) populateLog();
}

// ── Event wiring ─────────────────────────────────────────────────────────────
$('rsp').addEventListener('click',e=>{
  const btn=e.target.closest('[data-tab],[data-act]');if(!btn)return;
  if(btn.dataset.tab){ui.tab=btn.dataset.tab;ui.help=null;ui.logView=false;render();return}
  const a=btn.dataset.act;
  if(a==='theme'){sessionTheme=resolveTheme()==='dark'?'light':'dark';render()}
  else if(a==='lock'){ui.view='admin';ui.tab='settings';ui.help=null;render()}
  else if(a==='exit'){ui.view='auto';ui.help=null;render()}
  else if(a==='help'){ui.help=ui.help?null:'troubleshoot';render()}
});
$('logo').addEventListener('click',()=>{if(curView()==='admin'){ui.view='auto';render()}});

function wireBody(){
  const b=$('body');
  b.querySelectorAll('[data-go]').forEach(el=>el.onclick=()=>go(el.dataset.go));
  b.querySelectorAll('[data-ide]').forEach(el=>el.onclick=()=>launchIDE(el.dataset.ide));
  b.querySelectorAll('[data-term]').forEach(el=>el.onclick=()=>openTerminal(el));
  // appearance
  b.querySelectorAll('[data-acc]').forEach(el=>el.onclick=()=>setAppearance('accent',el.dataset.acc));
  b.querySelectorAll('[data-fnt]').forEach(el=>el.onclick=()=>setAppearance('font',el.dataset.fnt));
  b.querySelectorAll('[data-thm]').forEach(el=>el.onclick=()=>{sessionTheme=null;setAppearance('theme',el.dataset.thm)});
  b.querySelectorAll('[data-tg]').forEach(el=>el.onclick=()=>toggle(el.dataset.tg));
  b.querySelectorAll('[data-exp]').forEach(el=>el.onclick=()=>saveConfig({TIMEOUT_ACTION:el.dataset.exp}));
  b.querySelectorAll('[data-qd]').forEach(el=>el.onclick=()=>saveConfig({QUESTION_DELIVERY:el.dataset.qd}));
  b.querySelectorAll('[data-num]').forEach(el=>el.onchange=()=>{const v=Math.max(parseInt(el.min||'1',10),Math.min(parseInt(el.max||'9999',10),parseInt(el.value||'0',10)||parseInt(el.min||'1',10)));saveConfig({[el.dataset.num]:String(v)})});
  b.querySelectorAll('[data-src]').forEach(el=>el.onchange=()=>saveSource(el.value.trim()));
  b.querySelectorAll('[data-cfg]').forEach(el=>el.onchange=()=>saveAdminField(el.dataset.cfg,el.value.trim()));
  b.querySelectorAll('[data-run]').forEach(el=>el.onclick=()=>runFix(el.dataset.run,el));
  const unl=$('unl'); if(unl){unl.onclick=unlock; const pw=$('pw'); if(pw)pw.onkeydown=e=>{if(e.key==='Enter')unlock()}}
}

function go(dest){
  switch(dest){
    case'log':ui.logView=true;render();break;
    case'back':ui.logView=false;ui.help=null;render();break;
    case'troubleshoot':ui.help='troubleshoot';render();break;
    case'manual':ui.help='manual';render();break;
    case'retry':location.reload();break;
    case'end':ui.localComplete=true;render();break;
    case'remove':endInterview();break;
    case'reset':adminReset();break;
    case'newevent':adminNewEvent();break;
    case'endevent':adminEndEvent();break;
    case'shutdown':adminShutdown();break;
    case'reroll':rerollQuestion();break;
    case'qtoggle':toggleQuestionVisibility();break;
  }
}

// ── Actions ──────────────────────────────────────────────────────────────────
async function ensureAuth(){if(!adminToken)throw new Error('locked');return adminToken}
async function authedFetch(url,opts={}){
  const t=await ensureAuth();
  opts.headers={...(opts.headers||{}),'Authorization':'Bearer '+t};
  const res=await fetch(url,opts);
  if(res.status===401){adminToken=null;adminCfg=null;ui.unlocked=false;render();throw new Error('expired')}
  return res;
}
async function unlock(){
  const pw=($('pw')||{}).value||'';
  const err=$('gerr'); if(err)err.textContent='';
  try{
    const r=await fetch('/api/admin-unlock',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    const d=await r.json();
    if(r.ok&&d.token){adminToken=d.token;ui.unlocked=true;render();loadAdminCfg();if(pendingAfterUnlock){const f=pendingAfterUnlock;pendingAfterUnlock=null;f()}}
    else if(err)err.textContent=d.error||'Incorrect password.';
  }catch(_){if(err)err.textContent='Unlock failed.'}
}
async function loadAdminCfg(){
  try{const r=await authedFetch('/api/admin/config');adminCfg=await r.json();render()}catch(_){}
}
async function launchIDE(name){
  try{
    const r=await fetch('/api/launch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ide:name})});
    const d=await r.json();
    if(d.url)window.open(d.url,'_blank');
    if(d.instruction)alert(d.instruction);
  }catch(_){}
}
async function openTerminal(el){
  try{
    const r=await fetch('/api/open-terminal',{method:'POST'});
    const d=await r.json();
    if(!d.ok&&d.command){
      const note=document.createElement('div');note.className='qc';note.style.marginTop='10px';
      note.textContent=d.command;el.parentNode.appendChild(note);
    }
  }catch(_){}
}
// Fixes that stop the environment or delete ShellPort — warn before running.
const DESTRUCTIVE_FIXES=['m-remove','m-down','emergency'];
async function runFix(id,el){
  if(DESTRUCTIVE_FIXES.includes(id)){
    const ok=confirm('This runs a real command on your computer. It only affects ShellPort — it can stop the environment or delete ShellPort and your interview work, but your other apps, browser sign-ins and files are left untouched.\n\nContinue?');
    if(!ok)return;
  }
  const label=el?el.innerHTML:'';
  if(el){el.disabled=true;el.innerHTML='<i class="ti ti-loader"></i>Opening…'}
  try{
    const headers={'Content-Type':'application/json'};
    if(adminToken)headers['Authorization']='Bearer '+adminToken;
    const r=await fetch('/api/run-fix',{method:'POST',headers,body:JSON.stringify({id})});
    const d=await r.json();
    if(el){el.disabled=false;el.innerHTML=label}
    if(!d.ok&&el){
      const note=document.createElement('div');note.className='qc al';note.style.cssText='margin:8px 0 0 32px';
      note.textContent=(d.reason||'Could not open a terminal.')+(d.command?'  Run it yourself: '+d.command:'');
      el.parentNode.appendChild(note);
    }
  }catch(_){if(el){el.disabled=false;el.innerHTML=label}}
}
async function setAppearance(key,val){
  S.appearance={...S.appearance,[key]:val};
  applyTokens();render();
  try{await authedFetch('/api/appearance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({[key]:val})})}catch(_){}
}
function currentEnabledEditors(){return [...(S.enabledEditors||[])]}
async function toggle(key){
  if(key==='term'){await saveConfig({TERMINAL_ACCESS:S.terminalEnabled?'false':'true'});return}
  if(key==='web:vscode'){await saveConfig({SHOW_VSCODE_DEV:(S.config.SHOW_VSCODE_DEV||'true')!=='false'?'false':'true'});return}
  if(key==='web:github'){await saveConfig({SHOW_GITHUB_DEV:(S.config.SHOW_GITHUB_DEV||'true')!=='false'?'false':'true'});return}
  if(key==='timer'){await saveConfig({ENABLE_TIMER:(S.config.ENABLE_TIMER==='true')?'false':'true'});return}
  if(key.startsWith('ed:')){
    const name=key.slice(3);
    let set=currentEnabledEditors();
    set=set.includes(name)?set.filter(n=>n!==name):set.concat(name);
    await saveConfig({ENABLED_EDITORS:set.join(',')});
  }
}
async function saveConfig(patch){
  const cfg={...S.config,...patch};
  S.config=cfg;
  if('ENABLED_EDITORS' in patch) S.enabledEditors=(patch.ENABLED_EDITORS||'').split(',').map(s=>s.trim()).filter(Boolean);
  if('TERMINAL_ACCESS' in patch) S.terminalEnabled=patch.TERMINAL_ACCESS!=='false';
  render();
  try{await authedFetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)})}catch(_){}
}
async function saveSource(url){
  if(!adminCfg)adminCfg={};
  if(url===(adminCfg.QUESTIONS_URL||''))return;
  adminCfg.QUESTIONS_URL=url;
  if(url){S.questionLoading=true;S.question=null;S.questionHtml=null}
  render();
  try{await authedFetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({QUESTIONS_URL:url})})}catch(_){}
}
// Admin-only text fields withheld from the wire (webhook, label, project): held
// in adminCfg, saved through the auth-gated /api/config merge.
async function saveAdminField(key,val){
  if(!adminCfg)adminCfg={};
  if(val===((adminCfg[key])||''))return;
  adminCfg[key]=val;
  try{await authedFetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({[key]:val})})}catch(_){}
}
async function rerollQuestion(){try{await authedFetch('/api/reroll',{method:'POST'});S.questionLoading=true;S.question=null;S.questionHtml=null;render()}catch(_){}}
async function toggleQuestionVisibility(){try{await fetch('/api/question-toggle',{method:'POST'})}catch(_){}}
async function endInterview(){
  ui.localComplete=false;
  // Candidate (BYOD): remove ShellPort's own footprint AND its install folder,
  // then the server stops. Nothing the candidate did outside the app is touched.
  try{await fetch('/api/cleanup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({remove:true})})}catch(_){}
}
async function adminReset(){
  if(!confirm('Reset this workstation for the next candidate? This scrubs the host and rebuilds the environment.'))return;
  try{await authedFetch('/api/reset',{method:'POST'});ui.tab='reset';render()}catch(_){}
}
async function adminEndEvent(){
  if(!confirm('End the interview event and tear down this workstation?'))return;
  try{await authedFetch('/api/end-event',{method:'POST'});ui.tab='reset';render()}catch(_){}
}
// Reuse from the event-complete screen. A fresh page reload drops the in-memory
// token, so prompt for the admin unlock first, then resume the chosen action.
function gate(fn){if(adminToken)return false;pendingAfterUnlock=fn;ui.view='admin';ui.tab='settings';render();return true}
async function adminNewEvent(){
  if(gate(adminNewEvent))return;
  if(!confirm('Start a new interview event? This scrubs the host and rebuilds with a fresh question.'))return;
  try{await authedFetch('/api/reset',{method:'POST'});ui.view='admin';ui.tab='reset';render()}catch(_){}
}
async function adminShutdown(){
  if(gate(adminShutdown))return;
  if(!confirm('Shut down this machine now?'))return;
  try{await authedFetch('/api/shutdown',{method:'POST'})}catch(_){}
}

// ── Build log streaming ──────────────────────────────────────────────────────
function logTime(ts){const d=ts?new Date(ts):new Date();return d.toTimeString().slice(0,8)}
function appendLogLine(level,msg){
  const strm=$('strm');if(!strm)return;
  const l=document.createElement('div');l.className='sl';
  l.innerHTML='<span class="stm">'+logTime()+'</span><span class="v-'+level+'">'+(level==='step'?'▸ ':'  ')+esc(msg)+'</span>';
  strm.appendChild(l);strm.scrollTop=strm.scrollHeight;
}
async function populateLog(){
  const strm=$('strm');if(!strm)return;
  try{
    const r=await fetch('/api/build-log');const d=await r.json();
    strm.innerHTML='';
    (d.entries||[]).forEach(e=>{
      const l=document.createElement('div');l.className='sl';
      l.innerHTML='<span class="stm">'+logTime(e.ts)+'</span><span class="v-'+e.level+'">'+(e.level==='step'?'▸ ':'  ')+esc(e.msg)+'</span>';
      strm.appendChild(l);
    });
    strm.scrollTop=strm.scrollHeight;
  }catch(_){}
}

// ── WebSocket / state ────────────────────────────────────────────────────────
const STEP_LEVEL={warning:'warn',error:'err'};
function handle(msg){
  switch(msg.type){
    case'init':S=msg.state;applyTokens();render();break;
    case'status':S.status=msg.status;if(msg.status!=='ready')ui.localComplete=false;render();break;
    case'step':{const ex=(S.steps||[]).find(s=>s.id===msg.id);if(ex){ex.label=msg.label;ex.status=msg.status}else{(S.steps=S.steps||[]).push({id:msg.id,label:msg.label,status:msg.status})}appendLogLine(STEP_LEVEL[msg.status]||'step',msg.label);if(msg.status==='running')prog.op=msg.label;const onLog=ui.logView||(curView()==='admin'&&ui.tab==='log');if(!onLog)render();break}
    case'progress':prog.pct=msg.pct;prog.phase=msg.phase;updateProgressDom();break;
    case'log':appendLogLine('info',msg.line);break;
    case'clear_steps':S.steps=[];render();break;
    case'question':S.question=msg.text;S.questionHtml=msg.html;S.questionError=msg.error;S.questionPdf=msg.pdf||null;S.questionLoading=false;render();break;
    case'question_loading':S.questionLoading=true;render();break;
    case'question_visibility':S.questionVisible=msg.visible;render();break;
    case'timer':S.timer=msg;updateTimerDom();break;
    case'timer_expired':break;
    case'timer_stopped':S.timer=null;render();break;
    case'cleanup_complete':S.status='done';render();break;
    case'config':S.config=msg.config;render();break;
    case'appearance':S.appearance=msg.appearance;applyTokens();if(curView()==='admin'&&ui.tab==='settings')render();break;
    case'validation':break;
    case'validation_locked':S.validationLocked=true;render();break;
    case'event_complete':S.eventComplete=msg.info;S.status='event_complete';render();break;
    case'containment_leak':S.containmentLeak=msg.info;if(curView()==='admin'||S.status==='event_complete')render();break;
  }
}
// Notice shown on reset / event-complete when the candidate saved work outside the
// container. Only managed (admin) resets populate this.
function containmentLeakNote(){
  const o=S.containmentLeak; if(!o) return '';
  if(o.skipped) return '<div class="qc al" style="margin-top:14px">Containment-leak scrub skipped — no baseline snapshot to diff against. Verify the work dirs manually.</div>';
  if(!o.removedCount && !o.stillPresent) return '<div class="qc" style="margin-top:14px">No containment leak — the candidate stayed in <code>/workspaces</code>.</div>';
  const msg='Containment leak detected: removed '+o.removedCount+' file(s) the candidate saved outside the container'
    +(o.stillPresent? ' — '+o.stillPresent+' could NOT be removed (manual cleanup required)':'')
    +'. Only files added since the pre-session snapshot were removed; pre-existing files were left intact.';
  return '<div class="qc'+(o.stillPresent?' al':'')+'" style="margin-top:14px">'+esc(msg)+'</div>';
}
// Light DOM patches that avoid a full re-render on high-frequency messages.
function updateProgressDom(){
  const f=document.querySelector('.track .f');if(f)f.style.width=Math.max(0,Math.min(100,prog.pct))+'%';
  const big=document.querySelector('.big');if(big)big.innerHTML=prog.pct+'<span class="pc">%</span>';
}
function updateTimerDom(){
  // Timer wording lives in the question header label; cheap to re-render that screen.
  if(S.status==='ready'&&!ui.localComplete&&curView()!=='admin'&&!ui.logView&&!ui.help)render();
}

function connect(){
  const ws=new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+location.host);
  ws.onmessage=e=>handle(JSON.parse(e.data));
  ws.onclose=()=>setTimeout(connect,2000);
}
connect();
fetch('/api/state').then(r=>r.json()).then(s=>{S=s;applyTokens();render()}).catch(()=>render());

// Activity heartbeat: flag real interaction, report at most every 15s.
let activitySeen=false;
['mousemove','keydown','click','scroll','touchstart'].forEach(ev=>window.addEventListener(ev,()=>{activitySeen=true},{passive:true}));
setInterval(()=>{if(!activitySeen)return;activitySeen=false;fetch('/api/activity',{method:'POST'}).catch(()=>{})},15000);

if(mq&&mq.addEventListener)mq.addEventListener('change',()=>{if(!sessionTheme&&(S.appearance&&S.appearance.theme==='system'))render()});

render();
</script>
